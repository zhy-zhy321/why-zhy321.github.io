<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 GitHub 主页</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            animation: fadeIn 1s;
        }
        p {
            font-size: 1.2em;
            margin: 20px 0;
            opacity: 0.9;
        }
        .links {
            margin-top: 40px;
        }
        .links a {
            display: inline-block;
            margin: 10px;
            padding: 12px 30px;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: all 0.3s;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .links a:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">👋</div>
        <h1>你好，世界！</h1>
        <p>欢迎来到我的 GitHub 个人网站</p>
        <p>🚀 我正在学习编程和 Git</p>
        <div class="links">
            <a href="https://github.com/zhy-zhy321">📱 GitHub</a>
            <a href="https://github.com/zhy-zhy321/hello-github">📂 我的项目</a>
            <a href="#" onclick="alert('敬请期待！')">📧 联系我</a>
        </div>
        <p style="margin-top: 50px; opacity: 0.7; font-size: 0.9em;">
            Built with ❤️ using GitHub Pages
        </p>
    </div>
</body>
</html>
